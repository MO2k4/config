default_install_hook_types: [pre-commit, prepare-commit-msg]

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        stages: [pre-commit]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^iterm2/
      - id: end-of-file-fixer
        exclude: ^iterm2/
      - id: mixed-line-ending
        args: [--fix=lf]
        exclude: ^iterm2/
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: check-yaml
      - id: check-json
      - id: check-toml

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.13.1-1
    hooks:
      - id: shfmt
        args: [-w, -i, '4', -ci]
        files: (\.sh$|^git/hooks/prepare-commit-msg$)

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        files: (\.sh$|^git/hooks/prepare-commit-msg$)

  - repo: local
    hooks:
      - id: zsh-syntax-check
        name: zsh -n syntax check
        # zsh -n only parses its FIRST file argument (the rest become positional
        # params), so loop to syntax-check every file pre-commit passes.
        entry: zsh -c 'for f in "$@"; do zsh -n "$f" || exit 1; done' zsh-syntax-check
        language: system
        files: ^shell/(zshrc|zshenv|zprofile|functions/|zshrc\.d/.*\.zsh)
        pass_filenames: true

      - id: signoff
        name: Append Signed-off-by (DCO)
        entry: git/hooks/prepare-commit-msg
        language: script
        stages: [prepare-commit-msg]
        always_run: true
        # pre-commit passes the commit-message file as the single "filename"
        # for prepare-commit-msg hooks, so pass_filenames MUST be true for the
        # script to receive it as $1 (false suppresses it).
        pass_filenames: true
